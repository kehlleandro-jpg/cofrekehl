<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08090b;
  --surface:#0f1117;
  --s2:#13151c;
  --s3:#1a1d26;
  --border:rgba(255,255,255,0.045);
  --border2:rgba(255,255,255,0.08);
  --border3:rgba(255,255,255,0.13);
  --text:#eef0f5;
  --text2:#8a95a8;
  --muted:#2e3340;
  --muted2:#5c6578;
  --accent:#c8f53a;
  --accent-dim:rgba(200,245,58,0.07);
  --accent-border:rgba(200,245,58,0.18);
  --danger:#ff4d6a;
  --danger-dim:rgba(255,77,106,0.08);
  --warn:#f59e0b;
  --warn-dim:rgba(245,158,11,0.08);
  --green:#4ade80;
  --green-dim:rgba(74,222,128,0.09);
  --green-border:rgba(74,222,128,0.22);
  --info:#38bdf8;
  --info-dim:rgba(56,189,248,0.07);
  --nav-h:58px;
  --nav-total:calc(58px + env(safe-area-inset-bottom,0px));
  --r:22px;--r2:16px;--r3:10px;
  --font:'DM Sans',-apple-system,sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);height:100%;-webkit-font-smoothing:antialiased;overflow:hidden;}
#app{height:100%;display:flex;flex-direction:column;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-total)+140px);}

input,select,textarea{
  background:var(--s2);border:1px solid var(--border2);color:var(--text);
  border-radius:var(--r3);padding:13px 15px;font-size:15px;font-family:var(--font);
  width:100%;outline:none;-webkit-appearance:none;resize:none;transition:border-color 0.15s,box-shadow 0.15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,245,58,0.07);}
input::placeholder,textarea::placeholder{color:var(--muted2);}
select option{background:var(--s2);}
button{cursor:pointer;font-family:var(--font);border:none;outline:none;-webkit-tap-highlight-color:transparent;}

/* ── Nav ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--nav-total);
  background:rgba(9,10,17,0.97);border-top:1px solid var(--border);
  display:flex;align-items:flex-start;z-index:90;
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:none;color:var(--muted2);padding:0 4px;height:var(--nav-h);transition:color 0.15s;position:relative;}
.nav-btn.active{color:var(--accent);}
.nav-btn.active::after{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(200,245,58,0.6);}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:10px;letter-spacing:0.03em;font-weight:500;}

/* ── Page header ── */
.page-header{padding:60px 20px 0;max-width:430px;margin:0 auto;width:100%;}
.month-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.month-label{font-size:28px;font-weight:700;letter-spacing:-0.02em;color:var(--text);line-height:1;}
.month-year{font-size:13px;color:var(--muted2);font-weight:400;margin-left:5px;}
.month-arrows{display:flex;gap:6px;}
.month-arrow{background:var(--s2);color:var(--muted2);border-radius:50%;width:34px;height:34px;font-size:16px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);transition:all 0.12s;}
.month-arrow:not(:disabled):active{background:var(--s3);color:var(--text);}
.month-arrow:disabled{opacity:0.2;}
.sync-row{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:6px;}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px rgba(74,222,128,0.5);}
.sync-dot.err{background:var(--danger);}
.sync-dot.spin{background:var(--muted2);animation:pulse 1.2s infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes popIn{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}
.sync-label{font-size:10px;color:var(--muted2);font-weight:500;}
.icon-btn{background:var(--s2);color:var(--muted2);border-radius:99px;padding:6px 13px;border:1px solid var(--border2);font-size:11px;font-weight:500;transition:all 0.12s;}
.icon-btn:active{background:var(--s3);}
.icon-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border);}

/* ── Section ── */
.section{max-width:430px;margin:0 auto;padding:0 16px;width:100%;}

/* ── Hero card ── */
.hero-card{
  background:var(--s2);
  border-radius:var(--r);padding:22px 20px;
  border:1px solid var(--border2);
  margin-bottom:10px;
}
.card{background:var(--surface);border-radius:var(--r);padding:20px;border:1px solid var(--border2);margin-bottom:12px;}
.card-label{font-size:11px;color:var(--muted2);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;font-weight:500;}
.big-num{font-size:44px;font-weight:800;letter-spacing:-0.04em;color:var(--green);line-height:1;font-variant-numeric:tabular-nums;}
.big-num.neg{color:var(--danger);}
.big-num.muted{color:var(--muted2);font-size:20px;font-weight:300;letter-spacing:0;}
.sub-text{font-size:13px;color:var(--muted2);margin-top:8px;line-height:1.4;font-weight:400;}
.sub-text span{color:var(--text);font-weight:500;}

/* ── Progress ── */
.prog-wrap{margin-top:18px;}
.prog-bar{background:rgba(255,255,255,0.05);border-radius:99px;height:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.prog-labels{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--muted2);}

/* ── Summary grid ── */
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.sum-card{background:var(--s2);border-radius:var(--r3);padding:13px 12px;border:1px solid var(--border);}
.sum-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;font-weight:500;}
.sum-val{font-size:15px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}
.sum-val.warn{color:var(--warn);}
.sum-val.pos{color:var(--green);}
.sum-val.neg{color:var(--danger);}
.sum-val.info{color:var(--info);}
.sum-val.dim{color:var(--muted2);font-weight:400;font-size:14px;}

/* ── Health badge ── */
.health{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:5px 12px;font-size:11px;font-weight:600;margin-top:12px;}
.health.great{background:var(--green-dim);color:var(--green);}
.health.ok{background:var(--warn-dim);color:var(--warn);}
.health.bad{background:var(--danger-dim);color:var(--danger);}

/* ── Meta bar ── */
.meta-wrap{margin-top:12px;}
.meta-bar{background:rgba(255,255,255,0.05);border-radius:99px;height:3px;overflow:hidden;}
.meta-fill{height:100%;border-radius:99px;background:var(--accent);transition:width 0.4s;}
.meta-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted2);}

/* ── Lists ── */
.list-group{background:var(--s2);border-radius:var(--r2);overflow:hidden;margin-bottom:8px;}
.list-row{padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.list-row:last-child{border-bottom:none;}
.list-row.pago{opacity:0.32;}
.list-row.pago .row-title{text-decoration:line-through;}
.row-main{flex:1;min-width:0;}
.row-title{font-size:15px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-meta{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;align-items:center;}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500;}
.tag-meio{background:rgba(56,189,248,0.08);color:var(--info);}
.tag-pix{background:rgba(74,222,128,0.08);color:var(--green);}
.tag-credito{background:rgba(245,158,11,0.09);color:var(--warn);}
.tag-debito{background:rgba(200,245,58,0.06);color:#9ab830;}
.tag-dinheiro{background:var(--s3);color:var(--muted2);}
.tag-boleto{background:var(--s3);color:var(--muted2);}
.tag-resp{background:var(--accent-dim);color:var(--accent);}
.tag-venc-urgent{background:var(--danger-dim);color:var(--danger);}
.tag-venc-soon{background:var(--warn-dim);color:var(--warn);}
.tag-day{background:var(--s3);color:var(--muted2);}
.row-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.row-val{font-size:15px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;}
.btn-edit{background:transparent;color:var(--muted2);border-radius:7px;padding:5px 9px;font-size:11px;font-weight:500;border:1px solid var(--border2);}
.btn-del{background:transparent;color:var(--danger);border-radius:7px;padding:5px 9px;font-size:11px;font-weight:500;border:1px solid rgba(255,77,106,0.12);}

/* ── Pago toggle ── */
.btn-pago{background:none;border:1.5px solid var(--border2);color:var(--muted);border-radius:50%;width:34px;height:34px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.btn-pago.pago{background:var(--green-dim);border-color:var(--green-border);color:var(--green);}

/* ── Cat group ── */
.cat-hdr{width:100%;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;background:var(--s3);color:inherit;border-bottom:1px solid var(--border);}
.cat-hdr.collapsed{border-bottom:none;}
.cat-hdr-left{display:flex;align-items:center;gap:7px;}
.cat-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

<body>
<div id="app"></div><div id="fabs"></div>
<script>
const STORAGE_KEY = 'ck_shared_v7';
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MEIOS = ['Pix','Crédito','Débito','Dinheiro','Boleto','Outro'];
const MEIO_COR = {Pix:'#6ef0b8',Crédito:'#f0b86e',Débito:'#c8f06e',Dinheiro:'#6ef06e',Boleto:'#f09a6e',Outro:'#888884'};
const MEIO_TAG = {Pix:'tag-pix',Crédito:'tag-credito',Débito:'tag-debito',Dinheiro:'tag-dinheiro',Boleto:'tag-boleto',Outro:'tag-meio'};
const COLOR_PALETTE = ['#c8f06e','#6ec8f0','#f0c86e','#c86ef0','#f06ec8','#6ef0b8','#f09a6e','#6e9af0','#f06e6e','#6ef0e0','#b0f06e','#888884'];
const DEFAULT_CATS = [
  {nome:'Moradia',cor:'#c8f06e'},{nome:'Serviços',cor:'#f0c86e'},
  {nome:'Equipe',cor:'#c86ef0'},{nome:'Assinaturas',cor:'#f06ec8'},{nome:'Transporte',cor:'#6ef0b8'},
  {nome:'Alimentação',cor:'#f09a6e'},{nome:'Saúde',cor:'#6e9af0'},{nome:'Estudo',cor:'#a78bfa'},{nome:'Outros',cor:'#888884'},
];
const DEFAULT_CONTAS = [
  {id:1,nome:'Aluguel',valor:100,categoria:'Moradia',venc:5,meio:'Pix',resp:''},
  {id:2,nome:'Condomínio',valor:100,categoria:'Moradia',venc:10,meio:'Boleto',resp:''},
  {id:3,nome:'Luz',valor:100,categoria:'Moradia',venc:15,meio:'Débito',resp:''},
  {id:4,nome:'Internet',valor:100,categoria:'Moradia',venc:20,meio:'Débito',resp:''},
  {id:5,nome:'Celular',valor:100,categoria:'Moradia',venc:20,meio:'Débito',resp:''},
  {id:6,nome:'Contabilidade',valor:100,categoria:'Serviços',venc:5,meio:'Pix',resp:''},
  {id:7,nome:'Academia',valor:100,categoria:'Saúde',venc:1,meio:'Débito',resp:''},
  {id:8,nome:'Supermercado',valor:100,categoria:'Alimentação',venc:0,meio:'Crédito',resp:''},
  {id:9,nome:'Transporte',valor:100,categoria:'Transporte',venc:0,meio:'Pix',resp:''},
  {id:10,nome:'Streaming',valor:100,categoria:'Assinaturas',venc:15,meio:'Crédito',resp:''},
];

const DEFAULT_JARROS = [
  {id:1,nome:'Custos Fixos',pct:30,cor:'#6ec8f0',cats:[]},
  {id:2,nome:'Conforto',pct:15,cor:'#f0c86e',cats:[]},
  {id:3,nome:'Liberdade Financeira',pct:25,cor:'#c8f53a',cats:[]},
  {id:4,nome:'Prazeres',pct:10,cor:'#f06ec8',cats:[]},
  {id:5,nome:'Conhecimento',pct:5,cor:'#6ef0b8',cats:[]},
];
const fmt = v => Math.round(v).toLocaleString('pt-BR');
const fmtP = v => S.privado ? '••••' : fmt(v);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── State ─────────────────────────────────────────────
let S = {
  tab: 'resumo',
  activeMonth: new Date().getMonth(),
  months: {},
  cats: DEFAULT_CATS.map(c=>({...c})),
  collapsed: {},
  favoritos: [],
  modal: null,
  cfg: { imposto:9, meta:20 },
  jarros: DEFAULT_JARROS.map(j=>({...j,cats:[...j.cats]})),
  privado: false,
  solo: false,
  resumoExpanded: false,
  anualExpanded: false,
  jarroOpen: null,
  setupMode: 'home',
  setupError: null,
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      S.months = s.months||{};
      S.activeMonth = s.activeMonth ?? new Date().getMonth();
      if (s.cats?.length) S.cats = s.cats;
      if (s.cfg) S.cfg = {...S.cfg,...s.cfg};
      if (s.favoritos) S.favoritos = s.favoritos;
      if (s.privado) S.privado = s.privado;
      if (s.jarros?.length) S.jarros = s.jarros.filter(j=>j.nome!=='Metas');
      if (!S.jarros?.length) S.jarros = DEFAULT_JARROS.map(j=>({...j,cats:[...j.cats]}));
    }
  } catch(e) {}
sanitizeMonths();
  if(S.cats&&!S.cats.find(c=>c.nome==='Estudo'))S.cats.push({nome:'Estudo',cor:'#a78bfa'});
  if(S.cats){S.cats=S.cats.filter(c=>c.nome!=='Utilidades');Object.values(S.months).forEach(m=>{(m.contas||[]).forEach(c=>{if(c.categoria==='Utilidades')c.categoria='Moradia';});(m.variaveis||[]).forEach(v=>{if(v.categoria==='Utilidades')v.categoria='Moradia';});});}
  if (!S.months[S.activeMonth]) S.months[S.activeMonth] = makeMonth(DEFAULT_CONTAS);
}
function saveState() {
  calcInvalidate();
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({months:S.months,activeMonth:S.activeMonth,cats:S.cats,cfg:S.cfg,favoritos:S.favoritos,privado:S.privado,jarros:S.jarros})); } catch(e) {}
  schedulePush();
}
function makeMonth(contas) {
  return {rendas:[],contas:(contas||[]).map(c=>({...c})),variaveis:[],nota:'',nextId:20,nextVarId:100};
}
function cur() { return S.months[S.activeMonth]; }
function sanitizeMonths() {
  Object.keys(S.months).forEach(k => {
    const m = S.months[k];
    if (!m) { delete S.months[k]; return; }
    if (!Array.isArray(m.contas)) m.contas = [];
    if (!Array.isArray(m.variaveis)) m.variaveis = [];
    if (!Array.isArray(m.rendas)) m.rendas = [];
    if (typeof m.nota !== 'string') m.nota = '';
    if (!m.nextId) m.nextId = 20;
    if (!m.pagos || typeof m.pagos !== 'object') m.pagos = {};
    if (!m.nextVarId) m.nextVarId = 100;
    // Sanitize individual contas
    m.contas = m.contas.filter(c => c != null);
    m.variaveis = m.variaveis.filter(v => v != null);
    m.rendas = m.rendas.filter(r => r != null);
  });
}
function catColor(nome) { return (S.cats.find(c=>c.nome===nome)||{cor:'#888884'}).cor; }

// ── Computed ──────────────────────────────────────────
function totalRendas(m) { return (m.rendas||[]).reduce((s,r)=>s+r.valor,0) + (m.renda||0); }
const _calcCache = new Map();
function calcInvalidate(){_calcCache.clear();}
function calc(m) {
  const key=JSON.stringify([(m.rendas||[]).map(r=>r.valor),(m.contas||[]).map(c=>c.valor),(m.variaveis||[]).map(v=>v.valor),S.cfg]);
  if(_calcCache.has(key)) return _calcCache.get(key);
  try {
    const renda = totalRendas(m);
    const imp = (S.cfg.imposto||0)/100;
    const rendaLiq = Math.round(renda*(1-imp));
    const metaVal = Math.round(rendaLiq*(S.cfg.meta||0)/100);
    const activeM=S.activeMonth;
    const totalFixos = (m.contas||[]).filter(c=>{if(!c.parcelas_total||c.parcela_mes_inicio==null)return true;const pg=activeM-c.parcela_mes_inicio+1;return pg>=1&&activeM<=c.parcela_mes_inicio+c.parcelas_total-1;}).reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
    const totalVar = (m.variaveis||[]).reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
    const credito = [...(m.contas||[]),...(m.variaveis||[])].filter(c=>c.meio==='Crédito').reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
    const totalSaidas = totalFixos+totalVar;
    const sobra = rendaLiq-totalSaidas-metaVal;
    const pct = rendaLiq>0?Math.min(100,Math.round((totalSaidas+metaVal)/rendaLiq*100)):0;
    const byMeio = {};
    [...(m.contas||[]),...(m.variaveis||[])].forEach(c=>{
      if(c.meio) byMeio[c.meio]=(byMeio[c.meio]||0)+(parseFloat(c.valor)||0);
    });
    const byResp = {};
    (m.rendas||[]).forEach(r=>{ if(r.resp){byResp[r.resp]=byResp[r.resp]||{in:0,out:0};byResp[r.resp].in+=(parseFloat(r.valor)||0);} });
    [...(m.contas||[]),...(m.variaveis||[])].forEach(c=>{ if(c.resp){byResp[c.resp]=byResp[c.resp]||{in:0,out:0};byResp[c.resp].out+=(parseFloat(c.valor)||0);} });
    const res={renda,rendaLiq,metaVal,totalFixos,totalVar,credito,totalSaidas,sobra,pct,byMeio,byResp};
    _calcCache.set(key,res);return res;
  } catch(e) {
    console.error('calc error:', e);
    return {renda:0,rendaLiq:0,metaVal:0,totalFixos:0,totalVar:0,credito:0,totalSaidas:0,sobra:0,pct:0,byMeio:{},byResp:{}};
  }
}
function healthScore(sobra,rendaLiq,prevSobra) {
  const pct=rendaLiq>0?sobra/rendaLiq:0;
  let emoji,label,cls;
  if(pct>=0.2){emoji='🟢';label='Ótimo';cls='great';}
  else if(pct>=0.05){emoji='🟡';label='OK';cls='ok';}
  else{emoji='🔴';label='Atenção';cls='bad';}
  let comp='';
  if(prevSobra!==null){const d=sobra-prevSobra;comp=d>=0?` ↑ R$ ${fmt(d)}`:` ↓ R$ ${fmt(Math.abs(d))}`;}
  return {emoji,label,cls,comp};
}
function vencStatus(dia) {
  if(!dia) return null;
  if(S.activeMonth!==new Date().getMonth()) return null; // only show in current month
  const d=dia-new Date().getDate();
  if(d<0||d>7) return null;
  return d<=2?'urgent':'soon';
}

// ── Firebase Sync ─────────────────────────────────────
const FB_URL = 'https://cofre-kehl-default-rtdb.firebaseio.com/rooms';
let syncTimer=null, pushTimer=null, lastSyncAt=null, isSyncing=false;
function getRoomId(){return localStorage.getItem('room_id');}
function setRoomId(id){localStorage.setItem('room_id',id);}
function clearRoom(){localStorage.removeItem('room_id');localStorage.removeItem(STORAGE_KEY);}
async function createRoom(){
  const payload={months:S.months,cats:S.cats,cfg:S.cfg,favoritos:S.favoritos,ts:Date.now()};
  let res;
  try{res=await fetch(FB_URL+'.json',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(payload)});}
  catch(e){throw new Error('Sem conexão. ('+e.message+')');}
  if(!res.ok){const t=await res.text().catch(()=>'');throw new Error('Erro '+res.status+': '+t.slice(0,100));}
  const data=await res.json();
  const id=data?.name;
  if(!id) throw new Error('ID não retornado.');
  setRoomId(id);startAutoSync();return id;
}
async function joinRoom(id){
  const res=await fetch(`${FB_URL}/${id}.json`);
  if(!res.ok) throw new Error('Sala não encontrada.');
  const data=await res.json();
  if(!data) throw new Error('Sala não encontrada.');
  setRoomId(id);
  if(data.months) S.months=data.months;
  if(data.cats?.length) S.cats=data.cats;
  if(data.cfg) S.cfg={...S.cfg,...data.cfg};
  sanitizeMonths();
  if(!S.months[S.activeMonth]){
    let src=DEFAULT_CONTAS;
    for(let i=S.activeMonth-1;i>=0;i--){if(S.months[i]?.contas?.length){src=S.months[i].contas;break;}}
    S.months[S.activeMonth]=makeMonth(src);
  }
  saveState();lastSyncAt=Date.now();startAutoSync();return true;
}
async function pullRoom(){
  const id=getRoomId();
  if(!id||isSyncing) return;
  isSyncing=true;setSyncStatus('syncing');
  try{
    const res=await fetch(`${FB_URL}/${id}.json`);
    if(!res.ok) throw new Error();
    const data=await res.json();
    if(!data) return;
    if(data.ts&&data.ts>(lastSyncAt||0)){
      if(data.months) S.months=data.months;
      if(data.cats?.length) S.cats=data.cats;
      if(data.cfg) S.cfg={...S.cfg,...data.cfg};
      if(data.favoritos) S.favoritos=data.favoritos;
      if(data.jarros?.length) S.jarros=data.jarros;
      // activeMonth intentionally NOT synced - each user navigates independently
      sanitizeMonths();
      if(!S.months[S.activeMonth]){
    let src=DEFAULT_CONTAS;
    for(let i=S.activeMonth-1;i>=0;i--){if(S.months[i]?.contas?.length){src=S.months[i].contas;break;}}
    S.months[S.activeMonth]=makeMonth(src);
  }
      saveState();render();
    }
    lastSyncAt=Date.now();setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
  finally{isSyncing=false;}
}
async function pushRoom(){
  const id=getRoomId();if(!id)return;
  try{await fetch(`${FB_URL}/${id}.json`,{method:'PUT',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({months:S.months,cats:S.cats,cfg:S.cfg,favoritos:S.favoritos,jarros:S.jarros,ts:Date.now()})});lastSyncAt=Date.now();setSyncStatus('ok');}
  catch(e){setSyncStatus('err');}
}
function schedulePush(){if(!getRoomId())return;clearTimeout(pushTimer);pushTimer=setTimeout(pushRoom,2000);}
function startAutoSync(){clearInterval(syncTimer);syncTimer=setInterval(pullRoom,60000);}
function setSyncStatus(s){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-lbl');
  if(!dot||!lbl)return;
  dot.className='sync-dot'+(s==='err'?' err':s==='syncing'?' spin':'');
  if(s==='ok'){const t=new Date();lbl.textContent=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');}
  else lbl.textContent=s==='syncing'?'sincronizando...':'erro sync';
}

function setTab(t){S.tab=t;render();}
function setMonth(m){
  S.activeMonth=m;
  S._busca='';
  S._filtroPendente=false;
  if(!S.months[m]){
    // Find the closest PRIOR month with data (m-1, m-2, etc.)
    let srcContas=DEFAULT_CONTAS;
    for(let i=m-1;i>=0;i--){
      if(S.months[i]&&S.months[i].contas?.length){srcContas=S.months[i].contas;break;}
    }
    S.months[m]=makeMonth(srcContas);
  }
  saveState();render();
}
function saveRenda(valor,resp,origem,id){
  const m=cur();if(!m.rendas)m.rendas=[];
  if(id) m.rendas=m.rendas.map(r=>r.id===id?{...r,valor,resp,origem:origem||''}:r);
  else m.rendas.push({id:'r'+Date.now(),valor,resp:resp||'',origem:origem||''});
  S.modal=null;saveState();render();
}
function deleteRenda(id){cur().rendas=(cur().rendas||[]).filter(r=>r.id!==id);saveState();render();}
function saveConta(nome,valor,categoria,venc,meio,resp,id,propagate,parcTotal,parcPagas){
  const m=cur();
  const parcelas_total=parcTotal>0?parcTotal:null;
  const parcela_mes_inicio=parcelas_total!=null
    ? Math.max(0, S.activeMonth-(parcPagas>0?parcPagas-1:0))
    : null;

  const contaBase={nome,valor,categoria,venc,meio:meio||'',resp:resp||'',parcelas_total,parcela_mes_inicio};

  if(id){
    // EDIT: update current month
    const existing=m.contas.find(c=>c.id===id);
    const sourceId=existing?.sourceId||id; // stable ID for cross-month matching
    m.contas=m.contas.map(c=>c.id===id?{...c,...contaBase,sourceId}:c);

    if(propagate){
      for(let i=S.activeMonth+1;i<=11;i++){
        if(!S.months[i]) S.months[i]=makeMonth(m.contas);
        const fut=S.months[i];
        const shouldExist=!parcelas_total||(i<=parcela_mes_inicio+parcelas_total-1);
        // Find by sourceId first, then by original id, then by old name
        const existIdx=fut.contas.findIndex(c=>
          c.sourceId===sourceId||c.sourceId===id||c.id===id
        );
        if(shouldExist){
          if(existIdx>=0){
            fut.contas[existIdx]={...fut.contas[existIdx],...contaBase,sourceId};
          } else {
            fut.contas.push({id:fut.nextId++,...contaBase,sourceId});
          }
        } else {
          if(existIdx>=0) fut.contas.splice(existIdx,1);
        }
      }
    }
  } else {
    // NEW: add to current month
    const newId=m.nextId++;
    const sourceId=newId; // this month's ID is the stable reference
    m.contas.push({id:newId,...contaBase,sourceId});

    if(propagate){
      for(let i=S.activeMonth+1;i<=11;i++){
        const shouldExist=!parcelas_total||(i<=parcela_mes_inicio+parcelas_total-1);
        if(!shouldExist) break;
        if(!S.months[i]){
          S.months[i]=makeMonth(m.contas); // includes the new conta already
        } else {
          const fut=S.months[i];
          // Prevent duplicate: check if already propagated
          const alreadyExists=fut.contas.some(c=>c.sourceId===sourceId);
          if(!alreadyExists){
            fut.contas.push({id:fut.nextId++,...contaBase,sourceId});
          }
        }
      }
    }
  }
  S.modal=null;saveState();render();
}

function deleteConta(id){
  cur().contas=cur().contas.filter(c=>c.id!==id);
  saveState();render();
  // Offer to remove from future months too
  const hasFuture=Object.keys(S.months).some(k=>+k>S.activeMonth&&(S.months[k]?.contas||[]).some(c=>c.id===id));
  if(hasFuture){
    showConfirm('Remover dos próximos meses','Quer remover esta conta de todos os meses futuros também?',()=>{
      for(let i=S.activeMonth+1;i<=11;i++){
        if(S.months[i]) S.months[i].contas=(S.months[i].contas||[]).filter(c=>c.id!==id);
      }
      saveState();render();
    });
  }
}

function showConfirm(title,msg,onOk,danger){
  if(danger===undefined) danger=true;
  let el=document.getElementById('confirm-root');
  if(!el){el=document.createElement('div');el.id='confirm-root';document.body.appendChild(el);}
  el.innerHTML='<div class="confirm-overlay" id="co"><div class="confirm-box">'
    +'<div class="confirm-title">'+esc(title)+'</div>'
    +'<div class="confirm-msg">'+esc(msg)+'</div>'
    +'<div class="confirm-btns">'
    +'<button class="confirm-cancel" id="cc">Cancelar</button>'
    +'<button class="confirm-ok '+(danger?'danger':'neutral')+'" id="cok">'+(danger?'Remover':'Confirmar')+'</button>'

  document.getElementById('cok').onclick=()=>{hide();onOk();};

function toggleJarroCat(id,cat){
  const j=S.jarros.find(x=>x.id==id);
  if(!j) return;
  if(!j.cats) j.cats=[];
  if(j.cats.includes(cat)) j.cats=j.cats.filter(c=>c!==cat);
  else {
    S.jarros.forEach(jj=>{if(jj.id!=id){if(!jj.cats)jj.cats=[];jj.cats=jj.cats.filter(c=>c!==cat);}});
    j.cats.push(cat);
  }
  saveState();render(true);
}

// ── SVG ───────────────────────────────────────────────
function pieChart(segs,size=130){
  if(!segs.length||!segs.some(s=>s.v>0)) return `<svg width="${size}" height="${size}"><text x="${size/2}" y="${size/2+5}" text-anchor="middle" fill="#6e6b65" font-size="11">Sem dados</text></svg>`;
  const tot=segs.reduce((s,x)=>s+x.v,0);if(!tot)return '';
  let a=-Math.PI/2;const cx=size/2,cy=size/2,r=size/2-4,ri=r*0.52;let paths='';
  segs.forEach(seg=>{
    const sw=2*Math.PI*seg.v/tot;
    const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);a+=sw;
    const x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a);
    const xi1=cx+ri*Math.cos(a-sw),yi1=cy+ri*Math.sin(a-sw);
    const xi2=cx+ri*Math.cos(a),yi2=cy+ri*Math.sin(a);
    const lg=sw>Math.PI?1:0;
    paths+=`<path d="M${xi1},${yi1}L${x1},${y1}A${r},${r} 0 ${lg} 1 ${x2},${y2}L${xi2},${yi2}A${ri},${ri} 0 ${lg} 0 ${xi1},${yi1}Z" fill="${seg.cor}" opacity="0.9"/>`;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
}
function lineChart(data,labels,color,H=110){
  const W=320,pad=28,padL=44;
  const vals=data.filter(v=>v!==null&&!isNaN(v));
  if(!vals.length) return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;"><text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#6e6b65" font-size="11">Sem dados</text></svg>`;
  const mx=Math.max(...vals),mn=Math.min(0,...vals),range=mx-mn||1;
  const ys=v=>pad+(H-2*pad)*(1-(v-mn)/range);
  const xs=i=>padL+(W-padL-12)*i/(data.length-1||1);
  let path='',dots='',lbls='',yAxis='';
  let prev=null;
  data.forEach((v,i)=>{
    if(v===null){prev=null;return;}
    const x=xs(i),y=ys(v);
    path+=prev===null?`M${x},${y}`:`L${x},${y}`;
    dots+=`<circle cx="${x}" cy="${y}" r="3" fill="${color}"/>`;
    prev={x,y};
  });
  for(let i=0;i<=3;i++){
    const v=mn+range*i/3,y=ys(v);
    yAxis+=`<line x1="${padL-4}" y1="${y}" x2="${W-12}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    yAxis+=`<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="#6e6b65" font-size="9">${v>=1000?Math.round(v/1000)+'k':Math.round(v)}</text>`;
  }
  data.forEach((v,i)=>{ if(i%2===0||data.length<=6) lbls+=`<text x="${xs(i)}" y="${H-4}" text-anchor="middle" fill="#6e6b65" font-size="9">${labels[i]}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;">${yAxis}<path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>${dots}${lbls}</svg>`;
}

// ── Render ────────────────────────────────────────────
function render(keepScroll=false){
  const app=document.getElementById('app');
  if(!getRoomId()&&!S.solo){
    app.innerHTML=renderSetup();
    bindSetup();return;
  }
  const scrollY=keepScroll?(document.getElementById('screen')?.scrollTop||0):0;
  let tabContent='';
  try {
    tabContent = S.tab==='entradas'?renderEntradas():S.tab==='contas'?renderContas():S.tab==='resumo'?renderResumo():renderSettings();
  } catch(e) {
    console.error('render tab error:', e);
    tabContent = `<div class="section"><div class="empty" style="padding:60px 0;">Erro ao renderizar aba.<br><small style="color:var(--muted);">${e.message}</small></div></div>`;
  }
  app.innerHTML=`
    <div class="screen" id="screen">
      ${tabContent}
    </div>
    ${renderNav()}
    ${S.modal?renderModal():''}
  `;
  try { bind(); } catch(e) { console.error('bind error:', e); }
  if(keepScroll) document.getElementById('screen')?.scrollTo(0,scrollY);
  updateFabs();
}

function updateFabs(){
  const NAV=62;
  const BOTTOM=(NAV+18)+'px';
  const BASE='position:fixed;bottom:'+BOTTOM+';z-index:200;border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;border-radius:99px;padding:14px 22px;white-space:nowrap;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 20px rgba(0,0,0,0.4);';
  const ACC='background:#c8f53a;color:#050e00;right:16px;';
  const SEC='background:#1d2028;color:#f4f6f9;left:16px;border:1px solid rgba(255,255,255,0.13);';

  let el=document.getElementById('fabs');
  if(!el){el=document.createElement('div');el.id='fabs';document.body.appendChild(el);}

  if(S.modal){el.innerHTML='';return;}

  if(S.tab==='entradas'){
    el.innerHTML='<button id="fab-renda" style="'+BASE+ACC+'">+ Entrada</button>';
    document.getElementById('fab-renda').onclick=()=>{S.modal={mode:'add-renda'};render();};
  } else if(S.tab==='contas'){
    el.innerHTML='<button id="fab-var" style="'+BASE+ACC+'">+ Variável</button><button id="fab-conta" style="'+BASE+SEC+'">+ Conta fixa</button>';
    document.getElementById('fab-var').onclick=()=>{S.modal={mode:'add-var'};render();};
    document.getElementById('fab-conta').onclick=()=>{S.modal={mode:'add'};render();};
  } else {
    el.innerHTML='';
  }
}

// ── TAB: CONTAS ───────────────────────────────────────
function renderContas(){
  const m=cur();
  const totalFixos=m.contas.reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
  const totalVar=(m.variaveis||[]).reduce((s,c)=>s+(parseFloat(c.valor)||0),0);

  // Filter out parceladas that are done in this month
  const contasVisiveis=m.contas.filter(c=>{
    if(!c.parcelas_total||c.parcela_mes_inicio==null) return true;
    const pagas=S.activeMonth-c.parcela_mes_inicio+1;
    return pagas>=1 && S.activeMonth<=c.parcela_mes_inicio+c.parcelas_total-1;
  });
  const grupos={};
  S.cats.forEach(cat=>{
    let items=contasVisiveis.filter(c=>c.categoria===cat.nome);
    if(items.length) grupos[cat.nome]=items;
  });

  return `
    ${renderMonthHeader('Fixas + variáveis')}
    <div class="section">
      <!-- Favoritos strip -->
      ${(S.favoritos||[]).length>0?`<div style="margin-bottom:14px;">
        <div class="sec-hdr" style="margin-bottom:8px;"><span class="sec-title">⚡ Favoritos</span></div>
        <div style="display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;">
          ${(S.favoritos||[]).map(f=>`<button class="fav-chip" data-fav-id="${f.id}" style="flex-shrink:0;background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:8px 14px;text-align:left;">
            <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;">${esc(f.nome)}</div>
            <div style="font-size:10px;color:${catColor(f.categoria)};margin-top:1px;">${esc(f.categoria)}${f.meio?' · '+esc(f.meio):''}</div>
          </button>`).join('')}
        </div>
      </div>`:''}
      <!-- Quick totals -->
      <div class="sum-grid" style="margin-bottom:16px;">
        <div class="sum-card"><div class="sum-label">Fixos</div><div class="sum-val">R$ ${fmtP(totalFixos)}</div></div>
        <div class="sum-card" style="${totalVar>0?'background:var(--info-dim);border-color:rgba(110,200,240,0.2);':''}"><div class="sum-label">Variáveis</div><div class="sum-val ${totalVar>0?'info':'dim'}">${totalVar>0?`R$ ${fmtP(totalVar)}`:'—'}</div></div>
        <div class="sum-card"><div class="sum-label">Total</div><div class="sum-val">R$ ${fmtP(totalFixos+totalVar)}</div></div>
      </div>

      <!-- Fixas por categoria -->
      <div class="sec-hdr">
        <span class="sec-title">Contas fixas</span>
        <span class="sec-meta">${m.contas.length} itens</span>
      </div>
      ${Object.entries(grupos).map(([cat,items])=>{
        const allPago=items.length>0&&items.every(c=>m.pagos&&m.pagos[c.id]);
        const collapsed=allPago?(S.collapsed[cat]===false?false:true):!!S.collapsed[cat];
        const catTotal=items.reduce((s,c)=>s+c.valor,0);
        return `<div class="list-group" style="margin-bottom:10px;">
          <button class="cat-hdr ${collapsed?'collapsed':''}" data-cat="${esc(cat)}">
            <div class="cat-hdr-left">
              <span class="cat-dot" style="background:${catColor(cat)};"></span>
              <span class="cat-name">${esc(cat)}</span>
              <span class="cat-count">${items.length}</span>
            </div>
            <div class="cat-right">
              ${(() => {
                const pagosCount=items.filter(c=>m.pagos&&m.pagos[c.id]).length;
                if(pagosCount>0) return `<span style="font-size:10px;background:rgba(74,222,128,0.08);color:var(--green);border-radius:99px;padding:2px 8px;font-weight:600;border:1px solid rgba(74,222,128,0.18);">${pagosCount}/${items.length} pago${pagosCount>1?'s':''}</span>`;
                return '';
              })()}
              ${(() => {
                const catObj = S.cats.find(c=>c.nome===cat);
                const orc = catObj?.orcamento;
                if(orc && catTotal>0){
                  const pct=Math.min(100,Math.round(catTotal/orc*100));
                  const col=pct>=100?'var(--danger)':pct>=80?'var(--warn)':'var(--accent)';
                  return `<span style="font-size:11px;color:${col};font-weight:600;">${pct}%</span>`;
                }
                return '';
              })()}
              <span class="cat-total">R$ ${fmtP(catTotal)}</span>
              <span class="cat-arrow ${collapsed?'':'open'}">▾</span>
            </div>
          </button>
          ${!collapsed?items.map(c=>{
            const vs=vencStatus(c.venc);
            const isPago=!!(m.pagos&&m.pagos[c.id]);
            return `<div class="list-row ${isPago?'pago':''}">
              <button class="btn-pago ${isPago?'pago':''}" data-pago="${c.id}" title="${isPago?'Marcar como pendente':'Marcar como pago'}">✓</button>
              <div class="row-main" style="margin-left:10px;">
                <div class="row-title">${esc(c.nome)}</div>
                <div class="row-meta">
                  ${c.venc?`<span class="tag ${vs==='urgent'?'tag-venc-urgent':vs==='soon'?'tag-venc-soon':'tag-day'}">dia ${c.venc}${vs==='urgent'?' ⚠':vs==='soon'?' •':''}</span>`:''}
                  ${c.meio?`<span class="tag ${MEIO_TAG[c.meio]||'tag-meio'}">${esc(c.meio)}</span>`:''}
                  ${c.resp?`<span class="tag tag-resp">👤 ${esc(c.resp)}</span>`:''}
                  ${c.parcelas_total&&c.parcela_mes_inicio!=null?(()=>{
                    const pagas=S.activeMonth-c.parcela_mes_inicio+1;
                    const quitado=pagas>=c.parcelas_total;
                    return `<span class="parcela-badge${quitado?' pago-badge':''}">📦 ${pagas}/${c.parcelas_total}x${quitado?' ✓':''}</span>`;
                  })():''}
                </div>
              </div>
              <div class="row-right">
                <span class="row-val">R$ ${fmtP(c.valor)}</span>
                <button class="btn-edit" data-edit="${c.id}">editar</button>
                <button class="btn-del" data-del="${c.id}">✕</button>
              </div>
            </div>`;
          }).join(''):''}
          ${(()=>{
            const catObj2=S.cats.find(cx=>cx.nome===cat);
            if(!catObj2?.orcamento) return '';
            const pct2=Math.min(100,Math.round(catTotal/catObj2.orcamento*100));
            const col2=pct2>=100?'var(--danger)':pct2>=80?'var(--warn)':'var(--accent)';
            return '<div style="padding:10px 16px;background:var(--s2);border-top:1px solid var(--border);"><div class="orc-bar-wrap"><div class="orc-bar-fill" style="width:'+pct2+'%;background:'+col2+';"></div></div><div class="orc-label"><span>R$ '+fmtP(catTotal)+' / R$ '+fmtP(catObj2.orcamento)+'</span><span style="color:'+col2+';font-weight:600;">'+pct2+'%</span></div></div>';
          })()}
        </div>`;
      }).join('')}
      ${m.contas.length===0?'<div class="empty">Nenhuma conta fixa cadastrada.</div>':''}

      <!-- Variáveis -->
      <div class="sec-hdr" style="margin-top:16px;">
        <span class="sec-title">Gastos variáveis</span>
      </div>
      ${(m.variaveis||[]).length>0?`
      <div class="list-group" style="margin-bottom:16px;">
        ${(m.variaveis||[]).map(v=>`
          <div class="list-row">
            <div class="row-main">
              <div class="row-title">${esc(v.nome)}</div>
              <div class="row-meta">
                <span style="font-size:10px;color:${catColor(v.categoria)};">${esc(v.categoria)}</span>
                ${v.meio?`<span class="tag ${MEIO_TAG[v.meio]||'tag-meio'}">${esc(v.meio)}</span>`:''}
                ${v.resp?`<span class="tag tag-resp">👤 ${esc(v.resp)}</span>`:''}
              </div>
            </div>
            <div class="row-right">
              <span class="row-val">R$ ${fmtP(v.valor)}</span>
              <button class="btn-edit-var" data-id="${v.id}">editar</button>
              <button class="btn-del-var" data-id="${v.id}">✕</button>
            </div>
          </div>
        `).join('')}
      </div>`:`<div class="empty" style="padding:16px 0 24px;">Nenhum gasto variável lançado.</div>`}
      <div style="height:160px;"></div>
    </div>
  `;
}

// ── TAB: RESUMO ───────────────────────────────────────
function renderResumo(){
  const m=cur();
  const {renda,rendaLiq,metaVal,totalFixos,totalVar,credito,totalSaidas,sobra,pct,byMeio,byResp}=calc(m);
  const barColor=pct>90?'var(--danger)':pct>70?'var(--warn)':'var(--accent)';
  const prevM=S.months[S.activeMonth-1];
  const prevSobra=prevM?calc(prevM).sobra:null;
  const health=renda>0?healthScore(sobra,rendaLiq,prevSobra):null;
  const catTotals={};
  [...m.contas,...(m.variaveis||[])].forEach(c=>{catTotals[c.categoria]=(catTotals[c.categoria]||0)+c.valor;});
  const pizzaSegs=Object.entries(catTotals).map(([nome,v])=>({nome,v,cor:catColor(nome)})).filter(s=>s.v>0).sort((a,b)=>b.v-a.v);
  const meioBars=Object.entries(byMeio).sort((a,b)=>b[1]-a[1]);
  const respEntries=Object.entries(byResp);

  return `
    ${renderMonthHeader()}
    <div class="section">
      <!-- Saldo livre card -->
      <div class="hero-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span style="font-size:11px;color:var(--muted2);letter-spacing:0.06em;text-transform:uppercase;font-weight:500;">Saldo livre</span><button id="btn-dica" style="background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);border-radius:99px;padding:5px 12px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;letter-spacing:0.01em;">💡 Dica</button></div>
        <div class="big-num ${sobra<0?'neg':''}">${renda>0?`${sobra>=0?'':'-'}R$ ${fmtP(Math.abs(sobra))}`:'—'}</div>
        ${renda>0?`<div class="sub-text">Renda líquida: <span>R$ ${fmtP(rendaLiq)}</span></div>`:''}
        ${renda>0?`
        <div class="prog-wrap">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${barColor};"></div></div>
          <div class="prog-labels"><span>${pct}% comprometido</span><span style="color:${barColor};">${100-pct}% livre</span></div>
        </div>
        ${health?`<div class="health ${health.cls}">${health.emoji} ${health.label}${health.comp}</div>`:''}
        `:''}
      </div>

            <!-- LF breakdown -->
      ${renda>0&&metaVal>0?`
      <div style="background:var(--s2);border-radius:var(--r3);padding:12px 14px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <span style="color:var(--muted);">Sobra bruta</span>
          <span style="font-weight:600;">R$ ${fmtP(rendaLiq-totalSaidas)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <span style="color:var(--muted);">→ Liberdade financeira <span style="font-size:11px;opacity:.6;">${S.cfg.meta}%</span></span>
          <span style="font-weight:600;color:var(--accent);">− R$ ${fmtP(metaVal)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14px;">
          <span style="font-weight:600;">Saldo real</span>
          <span style="font-weight:800;color:${sobra>=0?'var(--green)':'var(--danger)'};">R$ ${fmtP(sobra)}</span>
        </div>
      </div>
      `:''}

      <!-- Cards grid -->
      ${renda>0?`
      <div class="sum-grid">
        <div class="sum-card"><div class="sum-label">Fixos</div><div class="sum-val">R$ ${fmtP(totalFixos)}</div></div>
        <div class="sum-card" style="${credito>0?'background:var(--warn-dim);border-color:rgba(240,184,110,0.2);':''}"><div class="sum-label">Crédito</div><div class="sum-val ${credito>0?'warn':'dim'}">${credito>0?`R$ ${fmtP(credito)}`:'—'}</div></div>
        <div class="sum-card" style="${totalVar>0?'background:var(--info-dim);border-color:rgba(110,200,240,0.2);':''}"><div class="sum-label">Variáveis</div><div class="sum-val ${totalVar>0?'info':'dim'}">${totalVar>0?`R$ ${fmtP(totalVar)}`:'—'}</div></div>
      </div>
      `:''}

            <!-- Mini gráfico mensal -->
      ${(()=>{
        const vals=MESES.map((_,i)=>S.months[i]&&totalRendas(S.months[i])>0?calc(S.months[i]).sobra:null);
        const nonNull=vals.filter(v=>v!==null);
        if(nonNull.length<2) return '';
        const mn2=Math.min(...nonNull), mx2=Math.max(...nonNull), rng=mx2-mn2||1;
        const W=280,H=48,pad=4;
        const pts=vals.map((v,i)=>{
          const x=pad+(i/11)*(W-pad*2);
          const y=v===null?null:H-pad-(v-mn2)/rng*(H-pad*2);
          return {x,y,v};
        }).filter(p=>p.y!==null);
        const path=pts.map((p,i)=>i===0?'M'+p.x+','+p.y:'L'+p.x+','+p.y).join(' ');
        const cur=pts.find(p=>p.v===vals[S.activeMonth]);
        return '<div class="chart-wrap" style="padding:12px 14px 10px;" onclick="S.anualExpanded=!S.anualExpanded;render(true);">'
          +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'
            +'<span style="font-size:12px;font-weight:600;color:var(--muted);">Saldo livre · 2026</span>'
            +'<span style="font-size:11px;color:var(--muted);">'+(S.anualExpanded?'fechar ↑':'ver anual ↓')+'</span>'
          +'</div>'
          +'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;overflow:visible;">'
            +'<path d="'+path+'" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>'
            +pts.map(p=>'<circle cx="'+p.x+'" cy="'+p.y+'" r="'+(cur&&p.x===cur.x?4:2.5)+'" fill="'+(p.v>=0?'var(--accent)':'var(--danger)')+'"/>'
            ).join('')
          +'</svg>'
        +'</div>';
      })()}
      ${S.anualExpanded?renderAnualInner():''}

      <!-- Pizza -->
      ${pizzaSegs.length>0?`
      <div class="chart-wrap">
        <div class="chart-title">Por categoria</div>
        <div class="pizza-wrap">
          ${pieChart(pizzaSegs,120)}
          <div class="pizza-legend">
            ${pizzaSegs.map(s=>`<div class="legend-row"><span class="legend-dot" style="background:${s.cor};"></span><span>${esc(s.nome)}: R$ ${fmtP(s.v)}</span></div>`).join('')}
          </div>
        </div>
      </div>`:''}

      <!-- Jarros financeiros -->
      ${(()=>{
        if(!renda) return '';
        if(!S.jarros?.length) return '';
        const jarroPcts=S.jarros.reduce((s,j)=>s+(j.nome==='Liberdade Financeira'?(S.cfg.meta||0):(j.pct||0)),0);
        if(!jarroPcts) return '';
        const totalGastos=(m.contas||[]).reduce((s,c)=>s+(parseFloat(c.valor)||0),0)+(m.variaveis||[]).reduce((s,v)=>s+(parseFloat(v.valor)||0),0);
        const metaVal=Math.round(rendaLiq*(S.cfg.meta||0)/100);
        const sobra=rendaLiq-totalGastos-metaVal;
        const cards=S.jarros.map(j=>{
          const isLF=j.nome==='Liberdade Financeira';
          const jPct=isLF?(S.cfg.meta||0):(j.pct||0);
          const jAlocado=Math.round(rendaLiq*jPct/100);
          const gasto=isLF?0:(j.cats||[]).reduce((s,cat)=>{
            const fixos=(m.contas||[]).filter(c=>c.categoria===cat).reduce((a,c)=>a+(parseFloat(c.valor)||0),0);
            const vars=(m.variaveis||[]).filter(v=>v.categoria===cat).reduce((a,v)=>a+(parseFloat(v.valor)||0),0);
            return s+fixos+vars;
          },0);
          const lfPreserved=jAlocado>0?Math.max(0,Math.min(jAlocado,jAlocado+sobra)):0;
          const usado=isLF?lfPreserved:gasto;
          const pctUsado=jAlocado>0?Math.min(100,Math.round(usado/jAlocado*100)):0;
          const ok=isLF?(sobra>=0):(gasto<=jAlocado);
          const barCol=ok?j.cor:(pctUsado>=80?'var(--warn)':'var(--danger)');
          const label=isLF?(sobra>=0?'meta ok':'abaixo'):(gasto>jAlocado?'acima':'ok');
          const labelCol=ok?'var(--green)':'var(--danger)';
          const gastoItems=isLF?[]:[...(m.contas||[]).filter(c=>(j.cats||[]).includes(c.categoria)),...(m.variaveis||[]).filter(v=>(j.cats||[]).includes(v.categoria))].sort((a,b)=>b.valor-a.valor);
          const isOpen=S.jarroOpen===j.id;
          const itemsList=isOpen&&gastoItems.length>0?'<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:4px;">'+gastoItems.map(it=>'<div style="display:flex;justify-content:space-between;font-size:11px;"><span style="color:var(--muted2);">'+(it.nome||'?')+'</span><span style="font-weight:600;">R$\u00a0'+fmtP(parseFloat(it.valor)||0)+'</span></div>').join('')+'</div>':'';
          return '<div onclick="S.jarroOpen=S.jarroOpen==='+j.id+'?null:'+j.id+';render(true);" style="background:var(--s2);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px;cursor:pointer;">'            +'<div style="display:flex;justify-content:space-between;align-items:flex-start;">'              +'<div style="display:flex;align-items:center;gap:6px;">'                +'<span style="width:8px;height:8px;border-radius:50%;background:'+j.cor+';flex-shrink:0;display:inline-block;"></span>'                +'<span style="font-size:12px;font-weight:600;line-height:1.2;">'+esc(j.nome)+'</span>'              +'</div>'              +'<span style="font-size:10px;color:'+labelCol+';background:'+labelCol+'18;border-radius:99px;padding:2px 7px;">'+label+'</span>'            +'</div>'            +'<div style="display:flex;justify-content:space-between;align-items:baseline;">'              +'<span style="font-size:16px;font-weight:800;color:'+barCol+';">R$ '+fmtP(usado)+'</span>'              +'<span style="font-size:11px;color:var(--muted);">de R$ '+fmtP(jAlocado)+' ('+jPct+'%)</span>'            +'</div>'            +'<div style="height:4px;background:var(--s3);border-radius:99px;overflow:hidden;">'              +'<div style="height:100%;width:'+pctUsado+'%;background:'+barCol+';border-radius:99px;transition:width .3s;"></div>'            +'</div>'          +itemsList
          +'</div>';
        }).join('');
        return '<div class="chart-wrap"><div class="chart-title">Jarros</div>'          +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+cards+'</div>'          +'</div>';
      })()}


      <div style="height:160px;"></div>
    </div>
  `;
}

// ── TAB: ANUAL ────────────────────────────────────────

function renderAnualInner(){
  try {
  const labels=MESES.map(m=>m.slice(0,3));
  const sobras=MESES.map((_,i)=>{try{return (S.months[i]&&totalRendas(S.months[i])>0)?calc(S.months[i]).sobra:null;}catch(e){return null;}});
  const rendas=MESES.map((_,i)=>{try{return (S.months[i]&&totalRendas(S.months[i])>0)?calc(S.months[i]).rendaLiq:null;}catch(e){return null;}});
  const sobraVals=sobras.filter(v=>v!==null&&!isNaN(v));
  const bestIdx=sobraVals.length?sobras.indexOf(Math.max(...sobraVals)):-1;
  const worstIdx=sobraVals.length?sobras.indexOf(Math.min(...sobraVals)):-1;
  const annualCats={};
  Object.values(S.months).forEach(m=>{
    if(!totalRendas(m)) return; // skip months with no income entered
    [...(m.contas||[]),...(m.variaveis||[])].forEach(c=>{if(c&&c.categoria)annualCats[c.categoria]=(annualCats[c.categoria]||0)+(parseFloat(c.valor)||0);});
  });
  const annualSegs=Object.entries(annualCats).map(([nome,v])=>({nome,v,cor:catColor(nome)})).filter(s=>s.v>0).sort((a,b)=>b.v-a.v);
  return `
    <!-- Highlights -->
      ${sobraVals.length>0?`
      <div class="sum-grid" style="margin-bottom:8px;">
        ${bestIdx>=0?`<div class="sum-card"><div class="sum-label">Melhor mês</div><div style="font-size:13px;font-weight:700;color:var(--accent);">${MESES[bestIdx].slice(0,3)}</div><div style="font-size:11px;color:var(--muted);">R$ ${fmtP(sobras[bestIdx])}</div></div>`:''}
        ${worstIdx>=0?`<div class="sum-card"><div class="sum-label">Pior mês</div><div style="font-size:13px;font-weight:700;color:var(--danger);">${MESES[worstIdx].slice(0,3)}</div><div style="font-size:11px;color:var(--muted);">R$ ${fmtP(sobras[worstIdx])}</div></div>`:''}
        <div class="sum-card"><div class="sum-label">Meses c/ dados</div><div style="font-size:20px;font-weight:700;">${sobraVals.length}</div></div>
      </div>`:''}

      <div class="chart-wrap">
        <div class="chart-title">Saldo livre por mês</div>
        ${lineChart(sobras,labels,'#c8f06e',110)}
      </div>
      <div class="chart-wrap">
        <div class="chart-title">Renda líquida por mês</div>
        ${lineChart(rendas,labels,'#6ec8f0',100)}
      </div>
      ${annualSegs.length>0?`
      <div class="chart-wrap">
        <div class="chart-title">Gastos anuais por categoria</div>
        <div class="pizza-wrap">
          ${pieChart(annualSegs,120)}
          <div class="pizza-legend">
            ${annualSegs.map(s=>`<div class="legend-row"><span class="legend-dot" style="background:${s.cor};"></span><span>${esc(s.nome)}: R$ ${fmtP(s.v)}</span></div>`).join('')}
          </div>
        </div>
      </div>`:''}
  `;
  } catch(e) { return ''; }
}

// ── SETTINGS ──────────────────────────────────────────
function renderSettings(){
  const roomId=getRoomId();
  return `
    <div class="page-header section" style="padding-top:56px;">
      <div class="month-row"><div class="month-label">Configurações</div></div>
    </div>
    <div class="section">
      <div class="card" style="margin-bottom:12px;">

// ── BIND ──────────────────────────────────────────────
function bind(){
  // Nav
  document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>{if(b.dataset.tab)setTab(b.dataset.tab);});
  document.getElementById('nav-back-settings')?.addEventListener('click',()=>{setTab('resumo');});

  // Settings btn
  document.getElementById('btn-settings')?.addEventListener('click',()=>setTab('settings'));
  document.getElementById('btn-dica')?.addEventListener('click',()=>getDica());
  document.getElementById('btn-pull')?.addEventListener('click',()=>pullRoom());
  document.getElementById('btn-privado')?.addEventListener('click',()=>togglePrivado());

  // Month arrows
  document.getElementById('prev-m')?.addEventListener('click',()=>{if(S.activeMonth>0)setMonth(S.activeMonth-1);});
  document.getElementById('next-m')?.addEventListener('click',()=>{if(S.activeMonth<11)setMonth(S.activeMonth+1);});
  // Swipe to change month
  {
    const scr=document.getElementById('screen');
    if(scr){
      let tx=0,ty=0,swiping=false;
      scr.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;swiping=true;},{passive:true});
      scr.addEventListener('touchmove',e=>{
        // If moving more vertically than horizontally, cancel swipe
        const dx=e.touches[0].clientX-tx;
        const dy=e.touches[0].clientY-ty;
        if(Math.abs(dy)>Math.abs(dx))swiping=false;
      },{passive:true});
      scr.addEventListener('touchend',e=>{
        if(!swiping)return;swiping=false;
        const dx=e.changedTouches[0].clientX-tx;
        const dy=e.changedTouches[0].clientY-ty;
        if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*2){
          if(dx<0&&S.activeMonth<11)setMonth(S.activeMonth+1);
          else if(dx>0&&S.activeMonth>0)setMonth(S.activeMonth-1);
        }
      },{passive:true});
    }
  }

  // Nota
  const nf=document.getElementById('nota-field');
  if(nf){
    let notaTimer=null;
    nf.onblur=()=>saveNota(nf.value);
    nf.oninput=()=>{clearTimeout(notaTimer);notaTimer=setTimeout(()=>saveNota(nf.value),1000);};
  }

  // Rendas
  document.querySelectorAll('[data-edit-renda]').forEach(b=>b.onclick=()=>{
    const r=(cur().rendas||[]).find(x=>x.id===b.dataset.editRenda);
    S.modal={mode:'edit-renda',renda:r};render();
  });
  document.querySelectorAll('[data-del-renda]').forEach(b=>b.onclick=()=>{showConfirm('Remover entrada','Tem certeza que quer apagar essa entrada?',()=>deleteRenda(b.dataset.delRenda));});

  // Cat collapse
  document.querySelectorAll('.cat-hdr').forEach(b=>b.onclick=()=>toggleCollapse(b.dataset.cat));

  // Pago toggle
  document.querySelectorAll('[data-pago]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    togglePago(+b.dataset.pago);
  });

  // Contas
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{
    const c=cur().contas.find(x=>x.id===+b.dataset.edit);S.modal={mode:'edit',conta:c};render();
  });
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{showConfirm('Remover conta','Quer remover esta conta fixa?',()=>deleteConta(+b.dataset.del));});

  // Variáveis
  document.querySelectorAll('.btn-edit-var').forEach(b=>b.onclick=()=>{
    const v=(cur().variaveis||[]).find(x=>x.id===+b.dataset.id);S.modal={mode:'edit-var',variavel:v};render();
  });
  document.querySelectorAll('.btn-del-var').forEach(b=>b.onclick=()=>{showConfirm('Remover gasto','Quer remover este gasto variável?',()=>deleteVar(+b.dataset.id));});

  // Modal
  const ov=document.getElementById('modal-overlay');
  if(ov) ov.onclick=e=>{if(e.target===ov){S.modal=null;render();}};
  document.getElementById('modal-close')?.addEventListener('click',()=>{S.modal=null;render();});
  // Auto-focus first input in modal
  setTimeout(()=>{
    const first=document.querySelector('.modal-box input:not([type=hidden]):not([type=checkbox]),  .modal-box select');
    if(first&&first.id!=='f-propagate') first.focus();
  },80);
  // Keyboard: Esc to close modal, Enter to confirm fav value
  document.addEventListener('keydown',function _kh(e){
    if(e.key==='Escape'&&S.modal){S.modal=null;render();document.removeEventListener('keydown',_kh);}
  },{once:false});
  document.getElementById('fav-use-val')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-confirm-fav')?.click();});
  document.getElementById('r-val')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-save-renda')?.click();});
  document.getElementById('v-val')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-save-var')?.click();});
  document.getElementById('f-val')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-save')?.click();});

  // Save renda
  document.getElementById('btn-save-renda')?.addEventListener('click',()=>{
    const val=parseFloat(document.getElementById('r-val')?.value);
    const resp=document.getElementById('r-resp')?.value.trim()||'';
    const origem=document.getElementById('r-origem')?.value.trim()||'';
    const id=document.getElementById('btn-save-renda')?.dataset.id||null;
    if(isNaN(val)||val<=0) return;
    saveRenda(val,resp,origem,id);
  });

  // Save conta
  // Custom propagate checkbox visual
  (function(){
    const cb=document.getElementById('f-propagate');
    const box=document.getElementById('f-propagate-box');
    if(!cb||!box) return;
    function update(){
      if(cb.checked){
        box.style.background='var(--accent)';
        box.style.borderColor='var(--accent)';
        box.innerHTML='<svg width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1 5l3.5 3.5L12 1" stroke="#0d1a00" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      } else {
        box.style.background='var(--s2)';
        box.style.borderColor='var(--border3)';
        box.innerHTML='';
      }
    }
    update();
    box.parentElement.addEventListener('click',()=>{cb.checked=!cb.checked;update();});
  })();

  document.getElementById('btn-save')?.addEventListener('click',()=>{
    const nome=document.getElementById('f-nome')?.value.trim();
    const val=parseFloat(document.getElementById('f-val')?.value);
    const cat=document.getElementById('f-cat')?.value;
    const venc=parseInt(document.getElementById('f-venc')?.value)||0;
    const meio=document.getElementById('f-meio')?.value||'';
    const resp=document.getElementById('f-resp')?.value.trim()||'';
    const id=document.getElementById('btn-save')?.dataset.id?+document.getElementById('btn-save').dataset.id:null;
    const propagate=document.getElementById('f-propagate')?.checked||false;
    const parcTotal=parseInt(document.getElementById('f-parc-total')?.value)||0;
    const parcPagas=parseInt(document.getElementById('f-parc-pagas')?.value)||0;
    if(!nome||isNaN(val)||val<=0) return;
    saveConta(nome,val,cat,venc,meio,resp,id,propagate,parcTotal,parcPagas);
  });

  // Save var
  document.getElementById('btn-save-var')?.addEventListener('click',()=>{
    const nome=document.getElementById('v-nome')?.value.trim();
    const val=parseFloat(document.getElementById('v-val')?.value);
    const cat=document.getElementById('v-cat')?.value;
    const meio=document.getElementById('v-meio')?.value||'';
    const resp=document.getElementById('v-resp')?.value.trim()||'';
    const id=document.getElementById('btn-save-var')?.dataset.id?+document.getElementById('btn-save-var').dataset.id:null;
    if(!nome||isNaN(val)||val<=0) return;
    saveVar(nome,val,cat,meio,resp,id);
  });

  // Settings
  document.getElementById('cfg-imp')?.addEventListener('blur',e=>{const v=parseFloat(e.target.value);if(!isNaN(v)){S.cfg.imposto=Math.max(0,Math.min(100,v));saveState();render();}});
  document.getElementById('cfg-meta')?.addEventListener('blur',e=>{const v=parseFloat(e.target.value);if(!isNaN(v)){S.cfg.meta=Math.max(0,Math.min(100,v));saveState();render();}});
  document.getElementById('btn-leave-room')?.addEventListener('click',()=>showConfirm('Sair da sala','Seus dados locais serão mantidos.',()=>{clearRoom();S.solo=false;S.setupMode='home';render();},false));
  document.getElementById('btn-goto-setup')?.addEventListener('click',()=>{S.solo=false;S.setupMode='home';render();});
  document.getElementById('btn-copy-code')?.addEventListener('click',()=>{
    const btn=document.getElementById('btn-copy-code');
    navigator.clipboard?.writeText(getRoomId()||'').then(()=>{if(btn){btn.textContent='Copiado!';setTimeout(()=>{btn.textContent='Copiar código';},2000);}});
  });
  document.getElementById('btn-export')?.addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify({months:S.months,cats:S.cats,cfg:S.cfg,favoritos:S.favoritos},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    const d=new Date();a.download=`cofre_kehl_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;a.click();
  });
  document.getElementById('import-file')?.addEventListener('change',e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();r.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);if(d.months)S.months=d.months;if(d.cats?.length)S.cats=d.cats;if(d.cfg)S.cfg={...S.cfg,...d.cfg};if(d.favoritos)S.favoritos=d.favoritos;sanitizeMonths();saveState();render();}
      catch(err){alert('Arquivo inválido.');}
    };r.readAsText(file);
  });
  document.querySelectorAll('.btn-del-cat').forEach(b=>b.onclick=()=>deleteCat(b.dataset.cat));
  // Jarros
  document.querySelectorAll('.jarro-pct').forEach(inp=>{
    inp.onblur=()=>{
      const id=+inp.dataset.id;
      const j=S.jarros.find(x=>x.id===id);
      if(j){j.pct=Math.max(0,Math.min(100,parseInt(inp.value)||0));saveState();render();}
    };
    inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();};
  });
  // jarro-cat-toggle via data attributes
  document.querySelectorAll('.jcat-btn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      toggleJarroCat(+btn.dataset.jid, btn.dataset.cat);
    };
  });

  document.querySelectorAll('.orc-input').forEach(inp=>{
    inp.onblur=()=>{
      const val=parseFloat(inp.value)||0;
      setOrcamento(inp.dataset.cat,val);
    };
    inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();};
  });
  document.getElementById('btn-add-cat')?.addEventListener('click',()=>{
    const nome=document.getElementById('new-cat-name')?.value.trim();
    const cor=document.getElementById('new-cat-color')?.value;
    if(!nome)return;addCat(nome,cor);
  });
  document.getElementById('new-cat-name')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-add-cat')?.click();});

  // Favoritos quick-launch
  document.querySelectorAll('.fav-chip').forEach(b=>b.onclick=()=>{
    const fav=S.favoritos.find(f=>String(f.id)===b.dataset.favId);
    if(fav){S.modal={mode:'use-fav',fav};render();setTimeout(()=>document.getElementById('fav-use-val')?.focus(),100);}
  });
  document.getElementById('btn-confirm-fav')?.addEventListener('click',()=>{
    const val=parseFloat(document.getElementById('fav-use-val')?.value);
    if(isNaN(val)||val<=0)return;
    useFavorito(S.modal.fav,val);
  });
  document.getElementById('btn-edit-this-fav')?.addEventListener('click',()=>{
    const fav=S.favoritos.find(f=>String(f.id)===document.getElementById('btn-edit-this-fav')?.dataset.id);
    if(fav){S.modal={mode:'edit-fav',fav};render();}
  });
  document.getElementById('btn-save-fav')?.addEventListener('click',()=>{
    const nome=document.getElementById('fav-nome')?.value.trim();
    const cat=document.getElementById('fav-cat')?.value;
    const meio=document.getElementById('fav-meio')?.value||'';
    const resp=document.getElementById('fav-resp')?.value.trim()||'';
    const rawId=document.getElementById('btn-save-fav')?.dataset.id;
    const id=rawId?+rawId:null;
    if(!nome)return;
    saveFavorito(nome,cat,meio,resp,id);
  });
  document.getElementById('btn-add-fav')?.addEventListener('click',()=>{S.modal={mode:'add-fav'};render();});
  document.querySelectorAll('.btn-edit-fav').forEach(b=>b.onclick=()=>{
    const fav=S.favoritos.find(f=>String(f.id)===b.dataset.id);
    if(fav){S.modal={mode:'edit-fav',fav};render();}
  });
  document.querySelectorAll('.btn-del-fav').forEach(b=>b.onclick=()=>{showConfirm('Remover favorito','Quer apagar este favorito?',()=>deleteFavorito(+b.dataset.id));});


  // Cat drag
  bindCatDrag();
}

function bindCatDrag(){
  document.querySelectorAll('.btn-cat-up').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.idx;
    if(i>0) reorderCats(i,i-1);
  });
  document.querySelectorAll('.btn-cat-dn').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.idx;
    if(i<S.cats.length-1) reorderCats(i,i+1);
  });
}


function bindSetup(){
  document.getElementById('btn-create-room')?.addEventListener('click',async()=>{
    S.setupMode='creating';S.setupError=null;render();
    try{await createRoom();S.setupMode='created';render();}
    catch(e){S.setupMode='home';S.setupError=e.message;render();}
  });
  document.getElementById('btn-join-room')?.addEventListener('click',()=>{S.setupMode='joining';render();});
  document.getElementById('btn-solo')?.addEventListener('click',()=>{S.solo=true;render();});
  document.getElementById('btn-enter-app')?.addEventListener('click',()=>{S.solo=false;render();});
  document.getElementById('btn-copy-code')?.addEventListener('click',()=>{
    const btn=document.getElementById('btn-copy-code');
    navigator.clipboard?.writeText(getRoomId()||'').then(()=>{if(btn){btn.textContent='Copiado!';setTimeout(()=>{btn.textContent='Copiar código';},2000);}});
  });
  document.getElementById('btn-confirm-join')?.addEventListener('click',async()=>{
    const code=document.getElementById('join-input')?.value.trim();if(!code)return;
    const btn=document.getElementById('btn-confirm-join');if(btn){btn.textContent='Entrando...';btn.disabled=true;}
    try{await joinRoom(code);S.setupMode=null;render();}
    catch(e){const err=document.getElementById('join-err');if(err)err.textContent=e.message;if(btn){btn.textContent='Entrar';btn.disabled=false;}}
  });
  document.getElementById('btn-back')?.addEventListener('click',()=>{S.setupMode='home';render();});
}

// ── Notifications ─────────────────────────────────────
function checkNotif(){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  if(!localStorage.getItem('notif_enabled')) return;
  const d=new Date(),key=`notif_${d.getFullYear()}_${d.getMonth()}`;
  if(d.getDate()===5&&!localStorage.getItem(key)){
    new Notification('Cofre Kehl 🔐',{body:`Lançou a renda de ${MESES[d.getMonth()]}?`});
    localStorage.setItem(key,'1');
  }
}


// ── Dica IA ──────────────────────────────────────────
async function getDica(){
  const m=cur();
  const {renda,rendaLiq,totalFixos,totalVar,pct}=calc(m);
  if(!renda){showToast('Lance entradas primeiro');return;}

  S.modal={mode:'dica',loading:true,text:''};render();

  const jarrStatus=(S.jarros||[]).filter(j=>j.nome!=='Liberdade Financeira').map(j=>{
    const jPct=j.pct||0;
    const jAlocado=Math.round(rendaLiq*jPct/100);
    const itens=[...(m.contas||[]),...(m.variaveis||[])].filter(c=>(j.cats||[]).includes(c.categoria));
    const gasto=itens.reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
    const status=gasto>jAlocado?'ACIMA do limite':'dentro do limite';
    const itensList=itens.sort((a,b)=>b.valor-a.valor).slice(0,5).map(c=>c.nome+' R$'+Math.round(parseFloat(c.valor)||0)).join(', ');
    return j.nome+': orçamento R$'+Math.round(jAlocado)+', gasto R$'+Math.round(gasto)+' ('+status+')'+(itensList?' — itens: '+itensList:'');
  }).join('\n');

  const prompt=`Você é um consultor de hábitos de consumo, direto e prático. Analise os gastos abaixo por jarro e dê UMA dica prática e específica — foque no jarro com maior problema ou oportunidade de melhoria. Não mencione investimentos, poupança ou Liberdade Financeira. Máximo 3 frases curtas. Vá direto ao ponto.

Gastos do mês:
${jarrStatus}
Fixos: R$${Math.round(totalFixos)} | Variáveis: R$${Math.round(totalVar)} | ${pct}% da renda comprometido`;

  try{
    const res=await fetch('/.netlify/functions/dica',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt})
    });
    const data=await res.json();
    const text=data.text||'Não foi possível gerar uma dica agora.';
    S.modal={mode:'dica',loading:false,text};render();
  }catch(e){
    S.modal={mode:'dica',loading:false,text:'Erro ao conectar. Verifique sua conexão.'};render();
  }
}

// ── Boot ──────────────────────────────────────────────
loadState();
checkNotif();
if(getRoomId()){S.solo=false;startAutoSync();pullRoom().then(()=>render());}
else{render();}
</script>
